syntax = "proto3";

option java_package = "net.matsudamper.browser.data";
option java_multiple_files = true;

enum HomepageType {
  HOMEPAGE_GOOGLE = 0;
  HOMEPAGE_DUCKDUCKGO = 1;
  HOMEPAGE_CUSTOM = 2;
}

enum SearchProvider {
  GOOGLE = 0;
  DUCKDUCKGO = 1;
  CUSTOM = 2;
}

enum ThemeMode {
  THEME_SYSTEM = 0;
  THEME_LIGHT = 1;
  THEME_DARK = 2;
}

enum TranslationProvider {
  TRANSLATION_PROVIDER_GECKO = 0;
  TRANSLATION_PROVIDER_LOCAL_AI = 1;
}

message BrowserSettings {
  HomepageType homepage_type = 1;
  string custom_homepage_url = 2;
  SearchProvider search_provider = 3;
  string custom_search_url = 4;
  reserved 5, 6;
  reserved "tab_states", "selected_tab_index";
  ThemeMode theme_mode = 7;
  repeated string notification_allowed_origins = 8;
  TranslationProvider translation_provider = 9;
  bool enable_third_party_ca = 10;
}
