syntax = "proto3";

option java_package = "net.matsudamper.browser.data";
option java_multiple_files = true;

message BrowserTabData {
  repeated BrowserTabState tab_states = 1;
  int32 selected_tab_index = 2;
}

message BrowserTabState {
  string url = 1;
  string session_state = 2;
  string title = 3;
  bytes preview_image_webp = 4;
  string tab_id = 5;
  string opener_tab_id = 6;
}
