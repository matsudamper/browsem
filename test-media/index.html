  <div id="status">停止中</div>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');

    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'テスト動画',
        artist: 'テストアーティスト',
        album: 'テストアルバム',
      });

      navigator.mediaSession.setActionHandler('play', () => video.play());
      navigator.mediaSession.setActionHandler('pause', () => video.pause());
      navigator.mediaSession.setActionHandler('previoustrack', () => { video.currentTime = 0; });
      navigator.mediaSession.setActionHandler('nexttrack', () => { /* no-op */ });
      navigator.mediaSession.setActionHandler('seekto', (e) => {
        if (e.seekTime != null) video.currentTime = e.seekTime;
      });
      navigator.mediaSession.setActionHandler('seekbackward', (e) => {
        video.currentTime = Math.max(0, video.currentTime - (e.seekOffset ?? 10));
      });
      navigator.mediaSession.setActionHandler('seekforward', (e) => {
        video.currentTime = Math.min(video.duration, video.currentTime + (e.seekOffset ?? 10));
      });
    }

    video.addEventListener('play', () => {
      status.textContent = '再生中';
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    });

    video.addEventListener('pause', () => {
      status.textContent = '一時停止';
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    });

    video.addEventListener('timeupdate', () => {
      if ('mediaSession' in navigator && video.duration && isFinite(video.duration)) {
        navigator.mediaSession.setPositionState({
          duration: video.duration,
          playbackRate: video.playbackRate,
          position: video.currentTime,
        });
      }
    });

    video.addEventListener('ended', () => {
      status.textContent = '再生終了';
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    });
  </script>
